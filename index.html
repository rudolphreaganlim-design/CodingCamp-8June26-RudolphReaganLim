<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <!-- ── Header / Annual Summary ──────────────────────────────────────────── -->
  <header id="annual-summary">
    <div class="header-left">
      <h1>💰 Expense &amp; Budget Visualizer</h1>
      <p class="header-subtitle">
        Annual Total &mdash;
        <span id="current-year">2026</span>
      </p>
    </div>

    <div class="header-right">
      <!-- Currency selector -->
      <div class="currency-wrapper">
        <label for="currency-select" class="currency-label">Currency</label>
        <select id="currency-select" aria-label="Select currency"
                class="currency-select-header">
          <!-- Options populated by app.js -->
        </select>
      </div>

      <span id="annual-amount">$0.00</span>

      <button id="theme-toggle" aria-label="Toggle theme">💸</button>
    </div>
  </header>

  <!-- ── Main content ──────────────────────────────────────────────────────── -->
  <main>

    <!-- LEFT COLUMN ──────────────────────────────────────────────────────── -->
    <div class="left-col">

      <!-- Add Expense Form -->
      <section class="card" aria-labelledby="form-heading">
        <h2 id="form-heading"><span>➕</span> Add Expense</h2>

        <form id="input-form" novalidate>

          <!-- Item Name -->
          <div class="form-field">
            <label for="field-name" class="field-label">Item Name</label>
            <input id="field-name" type="text" maxlength="100"
              placeholder="e.g. Coffee"
              aria-describedby="error-name"
              autocomplete="off"
              class="field-input" />
            <span id="error-name" class="field-error" data-for="name"
                  role="alert" aria-live="polite"></span>
          </div>

          <!-- Date -->
          <div class="form-field">
            <label for="field-date" class="field-label">Date</label>
            <input id="field-date" type="date"
              aria-describedby="error-date"
              class="field-input" />
            <span id="error-date" class="field-error" data-for="date"
                  role="alert" aria-live="polite"></span>
          </div>

          <!-- Amount -->
          <div class="form-field">
            <label for="field-amount" class="field-label">Amount</label>
            <input id="field-amount" type="number"
              min="0.01" max="9999999.99" step="0.01"
              placeholder="0.00"
              aria-describedby="error-amount"
              class="field-input" />
            <span id="error-amount" class="field-error" data-for="amount"
                  role="alert" aria-live="polite"></span>
          </div>

          <!-- Category -->
          <div class="form-field">
            <label for="field-category" class="field-label">Category</label>
            <select id="field-category" aria-describedby="error-category"
              class="field-input">
              <option value="">-- Select a category --</option>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Fun">🎉 Fun</option>
              <option value="Other">✏️ Other</option>
            </select>
            <span id="error-category" class="field-error" data-for="category"
                  role="alert" aria-live="polite"></span>
          </div>

          <!-- Custom Category -->
          <div class="form-field" id="custom-category-field">
            <label for="field-custom" class="field-label">Custom Category</label>
            <input id="field-custom" type="text" maxlength="50"
              placeholder="e.g. Hobbies"
              class="field-input hidden"
              aria-describedby="error-custom" />
            <span id="error-custom" class="field-error" data-for="custom"
                  role="alert" aria-live="polite"></span>
          </div>

          <button type="submit">Add Expense</button>

        </form>
      </section>

      <!-- Sort Control -->
      <div id="sort-control" class="card">
        <label for="sort-select">Sort by amount:</label>
        <select id="sort-select" class="field-input">
          <option value="none">Default</option>
          <option value="asc">Low → High</option>
          <option value="desc">High → Low</option>
        </select>
      </div>

      <!-- Pie Chart -->
      <section id="chart-section" class="card" aria-label="Spending by category">
        <h2><span>🥧</span> Spending by Category</h2>
        <div class="chart-wrapper">
          <canvas id="pie-chart" role="img"
            aria-label="Pie chart of spending by category"></canvas>
          <p id="chart-placeholder" class="hidden">
            No spending data available yet.
          </p>
          <p id="chart-error" class="hidden">
            ⚠️ Chart library failed to load. Please check your connection.
          </p>
        </div>
      </section>

    </div><!-- /LEFT COLUMN -->

    <!-- RIGHT COLUMN ─────────────────────────────────────────────────────── -->
    <div class="right-col">
      <h2 class="section-title"><span>📋</span> Transactions</h2>

      <section id="transaction-list" aria-label="Transaction list">
        <p id="empty-placeholder" class="hidden">
          No expenses recorded yet. Add your first one! 👆
        </p>
      </section>
    </div><!-- /RIGHT COLUMN -->

  </main>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"
          onerror="window.__chartFailed=true"></script>
  <!-- App module -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
