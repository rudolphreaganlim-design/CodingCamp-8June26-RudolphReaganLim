<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            /* ── Dark Gold Palette ─────────────────────────── */
            surface: { DEFAULT: '#121212', card: '#212121' },
            gold:    { DEFAULT: '#FFD700', dark: '#C9A800', muted: 'rgba(255,215,0,0.15)' },
            snow:    { DEFAULT: '#FAFAFA', muted: 'rgba(250,250,250,0.5)' },
          },
          fontFamily: {
            sans: ['"Inter"', '"Segoe UI"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            card:    '0 4px 20px 0 rgba(0,0,0,0.4)',
            'card-md':'0 8px 32px 0 rgba(0,0,0,0.5)',
          },
        }
      }
    }
  </script>

  <!-- App stylesheet -->
  <link rel="stylesheet" href="css/styles.css" />
</head>

<!-- light mode: almond bg; dark mode: bark bg -->
<body class="bg-[#121212] text-[#FAFAFA] font-sans min-h-screen transition-colors duration-300">

  <!-- ── Annual Summary / Header ─────────────────────────────────────────── -->
  <header id="annual-summary"
    class="sticky top-0 z-30 bg-[#212121] shadow-card-md px-6 py-4
           flex flex-wrap items-center justify-between gap-3 border-b border-[#FFD700]/10">

    <div>
      <h1 class="text-xl font-bold text-[#FAFAFA] tracking-wide leading-tight">
        💰 Expense &amp; Budget Visualizer
      </h1>
      <p class="text-[#FAFAFA]/50 text-sm mt-0.5">
        Annual Total &mdash; <span id="current-year" class="font-semibold text-[#FFD700]">2026</span>
      </p>
    </div>

    <div class="flex items-center gap-4">
      <!-- Currency selector -->
      <div class="flex items-center gap-2">
        <label for="currency-select"
          class="text-[#FAFAFA]/50 text-xs font-semibold uppercase tracking-wider hidden sm:block">
          Currency
        </label>
        <select id="currency-select"
          aria-label="Select currency"
          class="currency-select-header">
          <!-- Options populated by app.js -->
        </select>
      </div>

      <span id="annual-amount"
        class="text-3xl font-extrabold text-[#FFD700] drop-shadow">
        $0.00
      </span>
      <button id="theme-toggle"
        aria-label="Toggle theme"
        class="w-10 h-10 rounded-full bg-[#FFD700]/10 hover:bg-[#FFD700]/20
               text-[#FFD700] text-xl transition-colors duration-200
               flex items-center justify-center border border-[#FFD700]/30">
        💸
      </button>
    </div>
  </header>

  <!-- ── Main content ────────────────────────────────────────────────────── -->
  <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-2 gap-8">

    <!-- LEFT COLUMN ─────────────────────────────────────────────────────── -->
    <div class="flex flex-col gap-6">

      <!-- Add Expense Form -->
      <section class="bg-[#212121] rounded-2xl shadow-card p-6 border border-[#FFD700]/10"
               aria-labelledby="form-heading">
        <h2 id="form-heading"
            class="text-lg font-bold text-[#FFD700] mb-5 flex items-center gap-2">
          <span class="text-2xl">➕</span> Add Expense
        </h2>

        <form id="input-form" novalidate class="space-y-4">

          <!-- Item Name -->
          <div class="form-field">
            <label for="field-name" class="field-label">Item Name</label>
            <input id="field-name" type="text" maxlength="100"
              placeholder="e.g. Coffee"
              aria-describedby="error-name"
              autocomplete="off"
              class="field-input" />
            <span id="error-name" class="field-error" data-for="name"
                  role="alert" aria-live="polite"></span>
          </div>

          <!-- Date & Time -->
          <div class="form-field">
            <label class="field-label">Date &amp; Time</label>
            <div class="flex gap-2">
              <div class="flex-1">
                <input id="field-date" type="date"
                  aria-describedby="error-date"
                  class="field-input" />
              </div>
              <div class="w-32">
                <input id="field-time" type="time"
                  value="00:00"
                  min="00:00" max="23:59"
                  aria-label="Time"
                  class="field-input" />
              </div>
            </div>
            <span id="error-date" class="field-error" data-for="date"
                  role="alert" aria-live="polite"></span>
          </div>

          <!-- Amount -->
          <div class="form-field">
            <label for="field-amount" class="field-label">Amount</label>
            <input id="field-amount" type="number"
              min="0.01" max="9999999.99" step="0.01"
              placeholder="0.00"
              aria-describedby="error-amount"
              class="field-input" />
            <span id="error-amount" class="field-error" data-for="amount"
                  role="alert" aria-live="polite"></span>
          </div>

          <!-- Category -->
          <div class="form-field">
            <label for="field-category" class="field-label">Category</label>
            <select id="field-category" aria-describedby="error-category"
              class="field-input">
              <option value="">-- Select a category --</option>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Fun">🎉 Fun</option>
              <option value="Other">✏️ Other</option>
            </select>
            <span id="error-category" class="field-error" data-for="category"
                  role="alert" aria-live="polite"></span>
          </div>

          <!-- Custom Category (hidden until "Other" selected) -->
          <div class="form-field" id="custom-category-field">
            <label for="field-custom" class="field-label">Custom Category</label>
            <input id="field-custom" type="text" maxlength="50"
              placeholder="e.g. Hobbies"
              class="field-input hidden"
              aria-describedby="error-custom" />
            <span id="error-custom" class="field-error" data-for="custom"
                  role="alert" aria-live="polite"></span>
          </div>

          <button type="submit"
            class="w-full py-3 px-6 rounded-xl bg-[#FFD700] hover:bg-[#C9A800]
                   text-[#121212] font-bold text-sm tracking-wide
                   shadow-card transition-all duration-200
                   active:scale-[0.98] focus:outline-none focus:ring-2
                   focus:ring-[#FFD700]/50 focus:ring-offset-2 focus:ring-offset-[#212121]">
            Add Expense
          </button>

        </form>
      </section>

      <!-- Sort Control -->
      <div id="sort-control"
        class="bg-[#212121] rounded-2xl shadow-card px-6 py-4
               border border-[#FFD700]/10 flex items-center gap-4">
        <label for="sort-select"
          class="text-sm font-semibold text-[#FFD700] whitespace-nowrap">
          Sort by amount:
        </label>
        <select id="sort-select" class="field-input flex-1">
          <option value="none">Default</option>
          <option value="asc">Low → High</option>
          <option value="desc">High → Low</option>
        </select>
      </div>

      <!-- Pie Chart -->
      <section id="chart-section"
        class="bg-[#212121] rounded-2xl shadow-card p-6
               border border-[#FFD700]/10"
        aria-label="Spending by category">
        <h2 class="text-lg font-bold text-[#FFD700] mb-4 flex items-center gap-2">
          <span class="text-2xl">🥧</span> Spending by Category
        </h2>
        <div class="relative flex items-center justify-center min-h-[220px]">
          <canvas id="pie-chart" role="img"
            aria-label="Pie chart of spending by category"
            class="max-h-64"></canvas>
          <p id="chart-placeholder"
            class="hidden absolute text-center text-[#FAFAFA]/50 text-sm italic px-4">
            No spending data available yet.
          </p>
          <p id="chart-error"
            class="hidden absolute text-center text-[#FF5C5C] text-sm px-4">
            ⚠️ Chart library failed to load. Please check your connection.
          </p>
        </div>
      </section>

    </div><!-- /LEFT COLUMN -->

    <!-- RIGHT COLUMN — Transaction List ─────────────────────────────────── -->
    <div class="flex flex-col gap-2">
      <h2 class="text-lg font-bold text-[#FFD700] flex items-center gap-2 px-1">
        <span class="text-2xl">📋</span> Transactions
      </h2>

      <section id="transaction-list"
        class="flex flex-col gap-4 overflow-y-auto max-h-[78vh] pr-1"
        aria-label="Transaction list">
        <p id="empty-placeholder"
          class="hidden text-center text-[#FAFAFA]/50 italic mt-12 text-sm">
          No expenses recorded yet. Add your first one! 👆
        </p>
      </section>
    </div><!-- /RIGHT COLUMN -->

  </main>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"
          onerror="window.__chartFailed=true"></script>
  <!-- App module -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
